{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<style>
  /* Force block layout so avatar / name / bio stack vertically */
  .sidebar .author__avatar,
  .sidebar .author__content,
  .sidebar .author__urls-wrapper {
    display: block !important;
    width: 100% !important;
    padding-left: 0 !important;
    padding-right: 0 !important;
  }

  /* Larger avatar with space before bio */
  .sidebar .author__avatar {
    margin-bottom: 1.25rem;
  }

  .sidebar .author__avatar img {
    max-width: 240px !important;
    width: 240px !important;
    height: 240px !important;
    object-fit: cover;
    display: block;
    margin: 0 auto;
    border-radius: 50%;
  }

  /* Sidebar bio: use full column width + justify */
  .sidebar .author__content {
    max-width: none !important;
  }

  .sidebar .author__name {
    margin: 0 0 0.75rem 0;
    line-height: 1.3;
    text-align: left;
  }

  .sidebar .author__bio {
    margin: 0 0 1.25rem 0;
    line-height: 1.65;
    font-size: 1rem;
    text-align: justify;
    text-justify: inter-word;
    hyphens: auto;
    white-space: normal;
    overflow: visible;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }

  /* Divider between profile block and contact links */
  .sidebar .author__urls-wrapper {
    margin-top: 0.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--global-border-color);
  }

  .sidebar .author__urls li.author__desktop {
    white-space: normal;
    line-height: 1.55;
    margin-bottom: 0.4rem;
  }

  /* Break theme 1280px container + susy grid; use full browser width */
  @media screen and (min-width: 1024px) {
    #main {
      max-width: none !important;
      width: calc(100% - 2rem) !important;
      padding-left: 1rem !important;
      padding-right: 1rem !important;
      box-sizing: border-box;
    }

    .masthead__inner-wrap {
      max-width: none !important;
      width: calc(100% - 2rem) !important;
    }

    #main .sidebar.sticky {
      width: 260px;
      max-width: 260px;
      padding-right: 4px;
      box-sizing: border-box;
    }

    #main > .page {
      float: none !important;
      width: calc(100% - 268px) !important;
      max-width: none !important;
      margin-left: 268px !important;
      margin-right: 0 !important;
      padding-left: 0 !important;
      padding-right: 0 !important;
    }

    .sidebar .author__avatar img {
      max-width: 240px !important;
      width: 240px !important;
      height: 240px !important;
      margin: 0;
    }
  }

  @media screen and (min-width: 1400px) {
    #main,
    .masthead__inner-wrap {
      max-width: 2400px !important;
      margin-left: auto !important;
      margin-right: auto !important;
    }

    #main .sidebar.sticky {
      width: 270px;
      max-width: 270px;
      padding-right: 6px;
    }

    #main > .page {
      width: calc(100% - 278px) !important;
      margin-left: 278px !important;
    }
  }

  /* Hide site footer */
  .page__footer {
    display: none !important;
  }

  /* Main content: justified text */
  .page__content p,
  .page__content dd,
  .page__content .archive__item-excerpt,
  .archive__item-excerpt {
    text-align: justify;
    text-justify: inter-word;
    hyphens: auto;
    line-height: 1.75;
  }

  .page__content li {
    text-align: justify;
    text-justify: inter-word;
    line-height: 1.65;
  }

  .page__title,
  .page__content h1,
  .page__content h2,
  .page__content h3,
  .page__content h4,
  .page__content ul,
  .page__content ol {
    text-align: left;
  }

  .page__content.archive {
    width: 100%;
    max-width: 100%;
    margin-bottom: 0;
  }

  /* Publications list */
  .publication-item {
    margin-bottom: 2.5rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--global-border-color);
  }

  .publication-item:last-child {
    border-bottom: 0;
  }

  .archive__item-authors,
  .page__authors {
    margin: 0.35rem 0 0.5rem;
    font-size: 0.95rem;
    color: var(--global-text-color-light);
    line-height: 1.5;
  }

  .archive__item-venue,
  .page__venue {
    margin: 0 0 0.75rem;
    font-size: 0.95rem;
  }

  .publication-teaser {
    max-width: 100%;
    margin: 0.75rem 0 1rem;
  }

  .publication-teaser img {
    width: 100%;
    border-radius: 4px;
    border: 1px solid var(--global-border-color);
  }

  .publication-teaser--detail {
    max-width: 100%;
    margin: 1rem 0 1.25rem;
  }

  .archive__item-authors strong em,
  .page__authors strong em {
    font-style: italic;
    font-weight: 700;
    color: var(--global-text-color);
  }
</style>

<!-- end custom head snippets -->
